<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Hind:wght@400;500;600&family=Hind+Vadodara:wght@400;500;600&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Checkout – SilageDirect</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236B3A1F'/><text y='24' x='4' font-size='22'>🌾</text></svg>">
<link rel="stylesheet" href="css/checkout.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="header" id="hdr">
    <div class="container nav">
      <a href="index.html" class="logo"><i>❋</i><span>SilageDirect</span></a>
      <div class="lang" id="lang">
        <button class="active">EN</button>
        <button>हिं</button>
        <button>ગુ</button>
      </div>
      <div class="nav-right">
        <a href="product.html" class="back-link">← Continue Shopping</a>
      </div>
    </div>
  </header>

  <main class="container">

    <div class="checkout-grid">

      <!-- LEFT: Order Summary -->
      <section class="order-summary">
        <h2>Order Summary</h2>
        <div id="cart-items">
          <!-- Filled by checkout.js -->
        </div>
        <div class="summary-empty" id="empty-msg" style="display:none">
          <p>Your cart is empty. <a href="product.html">Browse products â†’</a></p>
        </div>
        <div class="summary-totals" id="summary-totals">
          <div class="total-row">
            <span>Subtotal</span>
            <span id="subtotal">₹0</span>
          </div>
          <div class="total-row">
            <span>Delivery</span>
            <span class="free">To be confirmed</span>
          </div>
          <div class="total-row total-final">
            <span>Total</span>
            <span id="grand-total">₹0</span>
          </div>
          <p class="cod-note">💵 Cash on Delivery — pay when your bales arrive</p>
        </div>
      </section>

      <!-- RIGHT: Delivery Details Form -->
      <section class="checkout-form">
        <h2>Your Details</h2>
        <p class="form-sub">We'll call you within 2 hours to confirm your order and delivery slot.</p>

        <div class="frow">
          <div class="frow2">
            <div class="fg">
              <label for="f-name">Full Name *</label>
              <input type="text" id="f-name" placeholder="Ramesh Patel" autocomplete="name">
            </div>
            <div class="fg">
              <label for="f-phone">Phone Number *</label>
              <input type="tel" id="f-phone" placeholder="+91 98765 00000" autocomplete="tel">
            </div>
          </div>
          <div class="fg">
            <label for="f-address">Village / Address *</label>
            <input type="text" id="f-address" placeholder="Village name, Taluka" autocomplete="address-line1">
          </div>
          <div class="frow2">
            <div class="fg">
              <label for="f-district">District *</label>
              <input type="text" id="f-district" placeholder="Mehsana">
            </div>
            <div class="fg">
              <label for="f-pincode">Pincode *</label>
              <input type="text" id="f-pincode" placeholder="384001" maxlength="6">
            </div>
          </div>
          <div class="fg">
            <label for="f-notes">Delivery Notes (optional)</label>
            <textarea id="f-notes" rows="2" placeholder="Best time to call, landmark, etc."></textarea>
          </div>

          <button class="btn-place-order" id="place-order">
            <span id="btn-text">Place Order (COD)</span>
            <span class="btn-arrow">→</span>
          </button>

          <div class="form-msg" id="form-status"></div>
        </div>
      </section>

    </div>
  </main>

  <script type="module" src="js/checkout.js"></script>
</body>
</html>
